<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Admission Assistance</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 min-h-screen">

<header class="bg-white shadow p-4 flex justify-between">

<h2 class="text-xl font-bold">Admission Assistance</h2>

<a href="../index.html" class="bg-gray-200 px-4 py-2 rounded">
Home
</a>

</header>


<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10 p-10">

<!-- INFO -->

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">
Admission Information
</h3>

<p id="moduleDescription" class="text-gray-600 mb-6"></p>

<h4 class="font-semibold mb-2">Application Demo</h4>

<input class="w-full border p-3 mb-3 rounded" placeholder="Full Name">

<input class="w-full border p-3 mb-3 rounded" placeholder="Email">

<select class="w-full border p-3 mb-3 rounded">
<option>B.Tech</option>
<option>MBA</option>
<option>B.Pharm</option>
</select>

<button class="bg-blue-600 text-white px-6 py-2 rounded">
Submit
</button>

</div>


<!-- CHATBOT -->

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">
Admission AI Assistant
</h3>

<div id="messages" class="h-72 border rounded p-3 overflow-y-auto mb-4"></div>

<input id="userInput"
class="w-full border p-3 rounded"
placeholder="Ask about admissions">

<button onclick="sendMessage()"
class="mt-3 bg-blue-600 text-white px-5 py-2 rounded">
Send
</button>

</div>

</div>

<script src="../script.js"></script>

</body>
</html>
