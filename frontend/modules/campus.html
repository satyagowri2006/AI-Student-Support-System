<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Campus Support</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 min-h-screen">

<header class="bg-white shadow p-4 flex justify-between">

<h2 class="text-xl font-bold">Campus Support</h2>

<a href="../index.html" class="bg-gray-200 px-4 py-2 rounded">
Home
</a>

</header>


<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10 p-10">

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">
Campus Facilities
</h3>

<p id="moduleDescription" class="text-gray-600 mb-6"></p>

<ul class="space-y-3 text-gray-700">
<li>Hostel accommodation</li>
<li>Transportation services</li>
<li>Library access</li>
<li>Campus navigation</li>
</ul>

</div>


<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">
Campus AI Assistant
</h3>

<div id="messages" class="h-72 border rounded p-3 overflow-y-auto mb-4"></div>

<input id="userInput"
class="w-full border p-3 rounded"
placeholder="Ask about campus facilities">

<button onclick="sendMessage()"
class="mt-3 bg-blue-600 text-white px-5 py-2 rounded">
Send
</button>

</div>

</div>

<script src="../script.js"></script>

</body>
</html>
